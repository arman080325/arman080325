<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="220" rx="12" fill="url(#termBg)" stroke="#00ff41" stroke-opacity="0.35"/>

  <!-- title bar -->
  <rect x="0" y="0" width="900" height="30" rx="12" fill="#111820"/>
  <rect x="0" y="18" width="900" height="12" fill="#111820"/>
  <circle cx="22" cy="15" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="15" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="15" r="6" fill="#27c93f"/>
  <text x="450" y="19" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e">armanxploits@fsociety: ~</text>

  <!-- terminal lines -->
  <g font-family="monospace" font-size="16" fill="#00ff41" filter="url(#glow)">
    <text x="24" y="60">
      <tspan fill="#00d8ff">root@fsociety</tspan>:<tspan fill="#7dd3fc">~$</tspan> whoami
    </text>

    <text x="24" y="88" opacity="0">
      Arman Ahemad Khan // armanxploits
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.08;0.12;0.9;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="24" y="116" opacity="0">
      role: full-stack dev :: ethical hacker
      <animate attributeName="opacity" values="0;0;0;1;1;1" keyTimes="0;0.15;0.2;0.24;0.9;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="24" y="144" opacity="0">
      status: build --release &amp;&amp; pentest --scope=authorized
      <animate attributeName="opacity" values="0;0;0;0;1;1;1" keyTimes="0;0.28;0.34;0.38;0.42;0.9;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="24" y="172" opacity="0">
      &gt; build it. break it. harden it. repeat.
      <animate attributeName="opacity" values="0;0;0;0;0;1;1;1" keyTimes="0;0.42;0.48;0.52;0.56;0.6;0.9;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <!-- blinking cursor -->
    <rect x="24" y="184" width="10" height="18" fill="#00ff41">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.5;1;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- occasional glitch flicker overlay -->
  <rect x="0" y="0" width="900" height="220" fill="#00ff41" opacity="0">
    <animate attributeName="opacity" values="0;0;0.05;0;0" keyTimes="0;0.61;0.615;0.62;1" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>
